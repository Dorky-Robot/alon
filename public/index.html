<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>alon</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #15151c;
      color: #e6e6ea;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      overflow: hidden;
    }
    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 10;
      font-size: 11px;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #2a2a35;
      border-radius: 4px;
      color: #a8a8b8;
      font-family: ui-monospace, SFMono-Regular, monospace;
    }
    #hint {
      position: fixed;
      bottom: 10px;
      right: 10px;
      z-index: 10;
      font-size: 11px;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #2a2a35;
      border-radius: 4px;
      color: #6a6a80;
    }
    #app {
      position: absolute;
      inset: 0;
    }
    .viewport {
      position: absolute;
      inset: 0;
      cursor: grab;
    }
    .viewport.panning { cursor: grabbing; }
    .canvas {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 0 0;
      will-change: transform;
    }
    .edges {
      position: absolute;
      left: -10000px;
      top: -10000px;
      width: 20000px;
      height: 20000px;
      pointer-events: none;
      overflow: visible;
    }
    .edges path {
      fill: none;
      stroke: #5a8aff;
      stroke-width: 1.5;
      opacity: 0.85;
    }

    .file-card {
      position: absolute;
      user-select: none;
    }
    .file-card .card {
      background: #ededf0;
      color: #1a1a20;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.55);
      border: 1px solid #0c0c12;
    }
    .file-card.root .card { box-shadow: 0 0 0 2px #ffaa55, 0 6px 18px rgba(0, 0, 0, 0.55); }
    .file-card.dragging .card { box-shadow: 0 10px 28px rgba(0, 0, 0, 0.75); }

    .file-card .row { cursor: pointer; }
    .file-card .row + .row { border-top: 1px solid #d0d0d6; }
    .file-card .row-head {
      padding: 10px 14px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      font-family: ui-monospace, SFMono-Regular, monospace;
    }
    .file-card .row-head .kind {
      font-size: 9px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #7a7a85;
    }
    .file-card .row-head .name {
      font-size: 14px;
      color: #1a1a20;
    }
    .file-card .row.expanded { background: #1c1c25; }
    .file-card .row.expanded + .row { border-top-color: #0c0c12; }
    .file-card .row.expanded .row-head .kind { color: #8c8ca0; }
    .file-card .row.expanded .row-head .name { color: #e6e6ea; }
    .file-card .source {
      margin: 0;
      padding: 6px 14px 12px;
      background: #1c1c25;
      color: #c8c8d4;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 11px;
      line-height: 16px;
      white-space: pre;
      overflow-x: auto;
      user-select: text;
    }
    .file-card .path {
      margin-top: 8px;
      padding-left: 4px;
      color: #8c8c9a;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 11px;
      cursor: grab;
    }
  </style>
</head>
<body>
  <div id="hud"><span id="hud-file">loading…</span></div>
  <div id="hint">drag to pan · pinch to zoom · click a function to reveal its source and callers/callees</div>
  <div id="app"></div>

  <script id="alon-graph" type="application/json">__ALON_GRAPH__</script>

  <script src="/public/vendor/react.production.min.js"></script>
  <script src="/public/vendor/react-dom.production.min.js"></script>
  <script src="/public/vendor/scittle.js"></script>
  <script src="/public/vendor/scittle.reagent.js"></script>

  <script type="application/x-scittle" src="/cljs/alon_ui/state.cljs"></script>
  <script type="application/x-scittle" src="/cljs/alon_ui/file_card.cljs"></script>
  <script type="application/x-scittle" src="/cljs/alon_ui/edges.cljs"></script>
  <script type="application/x-scittle" src="/cljs/alon_ui/canvas.cljs"></script>
  <script type="application/x-scittle" src="/cljs/alon_ui/core.cljs"></script>
</body>
</html>
